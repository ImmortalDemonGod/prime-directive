# CLAIMS
# =============================================================================
claims:
  - id: "CLM-001"
    type: [functional, structural]
    statement: >
      A 5-layer OperatorDossier data model (HumanIdentity, TechnicalCapabilities,
      ProfessionalNetwork, StrategicPositioning, ConnectionSurface) is implemented
      with YAML serialization, round-trip fidelity, validation, and auto-fix of
      malformed tags.
    scope:
      files:
        - "prime_directive/core/identity.py"
      functions:
        - "OperatorDossier"
        - "validate_operator_dossier"
        - "_normalize_tag_sequence"
        - "write_operator_dossier"
        - "read_operator_dossier"
    evidence_refs: ["EV-A-001", "EV-B-001", "EV-C-001"]

  - id: "CLM-002"
    type: [functional, structural]
    statement: >
      An empire.yaml configuration overlay loads project metadata (roles, strategic
      weights, dependencies) with DAG cycle detection via topological sort and
      validates weight constraints.
    scope:
      files:
        - "prime_directive/core/empire.py"
      functions:
        - "load_empire_config"
        - "EmpireConfig"
        - "detect_dependency_cycles"
    evidence_refs: ["EV-A-001", "EV-B-002"]

  - id: "CLM-003"
    type: [functional]
    statement: >
      Multi-language skill scanning detects dependencies from pyproject.toml,
      package.json, tsconfig.json, Cargo.toml, go.mod, and requirements.txt with
      bounded-depth monorepo traversal (max_depth=2, skip dirs).
    scope:
      files:
        - "prime_directive/core/skill_scanner.py"
      functions:
        - "scan_repository"
        - "scan_pyproject"
        - "scan_package_json"
        - "scan_cargo_toml"
        - "scan_go_mod"
        - "scan_requirements_txt"
    evidence_refs: ["EV-A-001", "EV-B-003"]

  - id: "CLM-004"
    type: [functional, operational]
    statement: >
      AI-backed theme extraction queries Ollama (primary) or OpenAI (fallback)
      with budget enforcement via AIUsageLog, token counting via tiktoken (with
      heuristic fallback), prompt truncation at 12k chars, and correct usage
      accounting even when response parsing fails.
    scope:
      files:
        - "prime_directive/core/dossier_ai.py"
        - "prime_directive/core/scribe.py"
      functions:
        - "suggest_themes"
        - "_count_tokens"
        - "finalize_success"
        - "finalize_error"
    evidence_refs: ["EV-A-001", "EV-B-004", "EV-C-002"]

  - id: "CLM-005"
    type: [functional, interface]
    statement: >
      Five CLI subcommands (pd dossier init, validate, sync-skills, sync-tags,
      show, export) are implemented with Rich terminal rendering, structured
      output, and correct error handling including early exit on deep analysis
      failure.
    scope:
      files:
        - "prime_directive/bin/pd.py"
      functions:
        - "dossier_init"
        - "dossier_validate"
        - "dossier_sync_skills"
        - "dossier_sync_tags"
        - "dossier_show"
        - "dossier_export"
    evidence_refs: ["EV-A-001", "EV-B-005", "EV-E-001"]

  - id: "CLM-006"
    type: [structural, operational]
    statement: >
      tmux session management is rewritten from blocking subprocess.run to async
      asyncio.create_subprocess_exec with timeout guards. The orchestrator awaits
      the now-async ensure_session. Interactive attach-session retains blocking
      subprocess.run by design (must hold the terminal).
    scope:
      files:
        - "prime_directive/core/tmux.py"
        - "prime_directive/core/orchestrator.py"
      functions:
        - "ensure_session"
        - "detach_current"
    evidence_refs: ["EV-A-001", "EV-B-006"]

  - id: "CLM-007"
    type: [structural, operational]
    statement: >
      SQLite schema migration uses PRAGMA user_version with a versioned migration
      dict, replacing implicit schema assumptions. Current schema version is 1.
    scope:
      files:
        - "prime_directive/core/db.py"
      functions:
        - "migrate_db"
        - "init_db"
    evidence_refs: ["EV-A-001", "EV-B-007"]

  - id: "CLM-008"
    type: [functional]
    statement: >
      Bash shell integration is provided alongside existing zsh integration,
      supporting the Exit 88 split-process handshake for pd switch and tab
      completion via complete -F.
    scope:
      files:
        - "prime_directive/system/shell_integration.bash"
    evidence_refs: ["EV-B-008", "EV-E-001"]

  - id: "CLM-009"
    type: [operational]
    statement: >
      pd doctor reports shell integration status (zsh vs bash detection) and
      tasks.json staleness warning triggers after 48 hours without modification.
    scope:
      files:
        - "prime_directive/bin/pd.py"
        - "prime_directive/core/tasks.py"
      functions:
        - "doctor"
    evidence_refs: ["EV-A-001", "EV-B-009"]

  - id: "CLM-010"
    type: [dependency]
    statement: >
      No new runtime dependencies are introduced beyond what was already declared.
      uv.lock changes reflect resolution updates only, not new package additions
      to pyproject.toml [dependencies].
    scope:
      files:
        - "uv.lock"
    evidence_refs: ["EV-C-003"]

