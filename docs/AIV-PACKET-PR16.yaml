# =============================================================================
# CLASSIFICATION (§5)
# =============================================================================
classification:
  risk_tier: R2
  sod_mode: S1
  critical_surfaces: []
  blast_radius: component
  classification_rationale: |
    Broad feature addition: 6 new modules, 5 new CLI subcommands, new data model
    (OperatorDossier), AI provider integration, and empire configuration overlay.
    23 files changed with +9,170/-134 lines across 44 atomic commits.

    R2 (not R3) because:
    - No authentication, authorization, or session management changes.
    - No cryptographic operations beyond what providers already handle.
    - No PII storage — dossier data is operator self-declared identity metadata.
    - No financial processing, privilege boundaries, or audit log modifications.
    - AI budget enforcement is a soft limit (logging + warning), not a billing gate.
    - Blast radius is component-scoped: changes are confined to the prime_directive
      package with no cross-service or infrastructure impact.

    R2 (not R1) because:
    - Adds public CLI surface area (5 new subcommands).
    - Introduces external dependency scanning (reads pyproject.toml, package.json,
      Cargo.toml, go.mod from operator repos).
    - Adds AI provider HTTP calls (Ollama, OpenAI) with budget tracking.
    - Modifies database schema (PRAGMA user_version migration).
    - Changes async I/O patterns in tmux.py and orchestrator.py.
  classified_by: "github.com/ImmortalDemonGod"
  classified_at: "2026-04-04T19:02:40Z"

