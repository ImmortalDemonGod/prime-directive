name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install project
        run: pip install -e ".[test]"
      - name: flake8
        run: flake8 prime_directive/
      - name: black
        run: black -l 79 --target-version py311 --check prime_directive/ tests/
      - name: mypy
        run: mypy --ignore-missing-imports prime_directive/

  test:
    needs: lint
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install project
        run: pip install -e ".[test]"
      - name: Run tests
        run: pytest -v --cov=prime_directive --cov-report=term-missing --cov-report=xml:coverage.xml --junitxml=test-results.xml -l --tb=short tests/
      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: test-results.xml
          retention-days: 30
      - name: Upload coverage
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 30
      - name: Test summary
        if: ${{ !cancelled() && runner.os == 'Linux' }}
        run: |
          echo "## Test Results (${{ matrix.os }} / Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('test-results.xml')
          root = tree.getroot()
          tests = root.attrib.get('tests', '0')
          failures = root.attrib.get('failures', '0')
          errors = root.attrib.get('errors', '0')
          skipped = root.attrib.get('skipped', '0')
          time = root.attrib.get('time', '0')
          status = ':white_check_mark:' if int(failures) + int(errors) == 0 else ':x:'
          print(f'| Metric | Value |')
          print(f'|--------|-------|')
          print(f'| Status | {status} |')
          print(f'| Tests  | {tests} |')
          print(f'| Failures | {failures} |')
          print(f'| Errors | {errors} |')
          print(f'| Skipped | {skipped} |')
          print(f'| Duration | {float(time):.1f}s |')
          " >> $GITHUB_STEP_SUMMARY
      - name: Upload to Codecov
        if: ${{ !cancelled() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11' }}
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
